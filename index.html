<!DOCTYPE html>
<html>
<head>
<title>Smart Agriculture</title>
<style>
body{font-family:Arial;background:#0b1a2a;color:#fff;text-align:center}
input,select{padding:10px;margin:5px;width:80%}
button{padding:10px;background:#00ff9d;border:none}
</style>
</head>

<body>

<h1>🌾 Smart Agriculture System</h1>

<h3>Farmer Registration</h3>

<input id="name" placeholder="Name"><br>
<input id="email" placeholder="Email"><br>
<input id="location" placeholder="Location"><br>

<select id="soil">
<option>red</option>
<option>black</option>
<option>alluvial</option>
</select><br>

<button onclick="register()">Register</button>

<h3>Crop Recommendation</h3>
<button onclick="getCrop()">Suggest Crop</button>

<p id="result"></p>

<script>

function register(){
fetch("http://localhost:8080/api/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:document.getElementById("name").value,
email:document.getElementById("email").value,
location:document.getElementById("location").value,
soilType:document.getElementById("soil").value
})
})
.then(res=>res.json())
.then(data=>alert("Registered Successfully"))
}

function getCrop(){
let soil=document.getElementById("soil").value;

fetch(`http://localhost:8080/api/crop?soil=${soil}`)
.then(res=>res.text())
.then(data=>{
document.getElementById("result").innerText="Recommended Crop: "+data;
})
}

</script>

</body>
</html>
